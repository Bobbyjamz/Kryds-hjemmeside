<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0C0C0A"/>

  <!-- Grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(242,238,230,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(242,238,230,0.04)" stroke-width="1"/>

  <!-- Large X watermark (right side) -->
  <line x1="780" y1="80" x2="1100" y2="550" stroke="#F5C400" stroke-width="60" stroke-linecap="square" opacity="0.07"/>
  <line x1="1100" y1="80" x2="780" y2="550" stroke="#F2EEE6" stroke-width="60" stroke-linecap="square" opacity="0.07"/>

  <!-- Logo X (left) -->
  <line x1="100" y1="220" x2="200" y2="320" stroke="#F5C400" stroke-width="18" stroke-linecap="square"/>
  <line x1="200" y1="220" x2="100" y2="320" stroke="#F2EEE6" stroke-width="18" stroke-linecap="square"/>

  <!-- KRYDS wordmark -->
  <text x="225" y="322" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900" letter-spacing="-2" text-transform="uppercase" fill="#F2EEE6">
    <tspan fill="#F5C400">K</tspan>RYDS
  </text>

  <!-- Tagline -->
  <text x="100" y="385" font-family="Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="4" fill="#888880" text-transform="uppercase">
    STÆRKE HÆNDER · BYGGEPROJEKTER · KØBENHAVN
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(245,196,0,0.08)"/>
  <text x="100" y="612" font-family="Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="2" fill="#F5C400" opacity="0.7">
    KRYDSBYG.COM
  </text>
  <text x="1100" y="612" font-family="Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="2" fill="#888880" text-anchor="end">
    Sæt et kryds i kalenderen.
  </text>
</svg>
